<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>test</title>
<style>
:root{
--pink:#ffb6c1;
--light-pink:#ffe4f1;
--white:#FFFFFF;
--text:#2B2B2B;
--shadow:0 10px 25px rgba(0,0,0,.12);
--radius:18px;
}
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial, sans-serif;
color:var(--text);
background:linear-gradient(180deg,var(--light-pink) 0%, #fff 100%);
}
header{
background:var(--white);
border-bottom:6px solid var(--pink);
text-align:center;
padding:22px 16px;
}
h1{
margin:0;
font-size:32px;
color:var(--pink);
font-weight:800;
}
main{
display:grid;
place-items:center;
padding:24px;
}
.card{
width:min(100%,1080px);
background:var(--white);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:18px;
}
.video-wrapper{
position:relative;
width:100%;
aspect-ratio:16 / 9;
border-radius:12px;
overflow:hidden;
border:6px solid var(--pink);
}
iframe{
width:100%;
height:100%;
border:0;
}
</style>
</head>
<body>

<header>
<h1>test</h1>
</header>

<main>
<section class="card">

<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/4-nsa0eZUpo" allowfullscreen></iframe>
</div>

<p>
Video link:
<a href="https://youtu.be/4-nsa0eZUpo" target="_blank">https://youtu.be/4-nsa0eZUpo</a>
</p>

</section>
</main>

</body>
</html>
